<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerçekçi Cafe Kasa</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f1f3f5; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 360px; text-align: center; }
        .order-info { background: #fff9db; border: 2px solid #fcc419; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: left; font-size: 1.1rem; color: #444; min-height: 60px; display: flex; flex-direction: column; justify-content: center; }
        .money-box { background: #e7f5ff; color: #1971c2; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; font-size: 1.1rem; border: 1px solid #a5d8ff; line-height: 1.4; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #dee2e6; border-radius: 8px; box-sizing: border-box; font-size: 1.5rem; text-align: center; color: #2c3e50; }
        input:focus { border-color: #339af0; outline: none; background: #fff; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1rem; background: #40c057; color: white; transition: 0.2s; }
        button:hover { background: #37b24d; }
        #feedback { margin-top: 15px; font-weight: bold; min-height: 50px; line-height: 1.4; }
        .success { color: #2f9e44; }
        .error { color: #e03131; }
        .stats { margin-top: 15px; font-size: 0.8rem; color: #adb5bd; border-top: 1px solid #eee; padding-top: 10px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #666; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top:0; color: #343a40;">Cafe Kasa</h2>
    
    <div id="order" class="order-info"></div>
    <div id="money" class="money-box"></div>

    <label for="changeInput">VERİLECEK PARA ÜSTÜ</label>
    <input type="number" id="changeInput" placeholder="0.00" step="0.5" autofocus>
    
    <button onclick="kontrolEt()">PARA ÜSTÜNÜ VER</button>

    <div id="feedback"></div>
    <div id="stats" class="stats">Doğru: 0 | Yanlış: 0</div>
</div>

<script>
    let data = { toplam: 0, paraUstu: 0 };
    let skor = { d: 0, y: 0 };
    const banknotlar = [200, 100, 50, 20, 10, 5];

    function odemeOlustur(hedef) {
        let birlesen = [];
        let mevcutToplam = 0;

        // Müşteri cebinden tutarı geçene kadar en mantıklı banknotları çıkarıyor
        for (let b of banknotlar) {
            while (mevcutToplam + b <= hedef + (b/2)) { // Hedefe yaklaş ama çok da saçma büyük para verme
                mevcutToplam += b;
                birlesen.push(b);
                if (mevcutToplam >= hedef) break;
            }
            if (mevcutToplam >= hedef) break;
        }

        // Eğer hala hedefi bulamadıysa, hedefi geçen en küçük banknotu ekle
        if (mevcutToplam < hedef) {
            let eksik = hedef - mevcutToplam;
            let tamamlayici = [...banknotlar].reverse().find(b => b >= eksik);
            mevcutToplam += tamamlayici;
            birlesen.push(tamamlayici);
        }

        return { liste: birlesen, toplam: mevcutToplam };
    }

    function yeniMusteri() {
        const ekmekAdet = Math.floor(Math.random() * 7); 
        const urunAdet = Math.floor(Math.random() * 3);  
        const urunFiyat = (Math.floor(Math.random() * 17) + 4) * 5;

        data.toplam = (ekmekAdet * 17.5) + (urunAdet * urunFiyat);
        if (data.toplam === 0) return yeniMusteri();

        let odeme = odemeOlustur(data.toplam);
        data.paraUstu = odeme.toplam - data.toplam;

        let htmlIcerik = "";
        if (ekmekAdet > 0) htmlIcerik += `<div>🥖 <strong>${ekmekAdet}</strong> Ekmek (17.5 TL)</div>`;
        if (urunAdet > 0) htmlIcerik += `<div>☕ <strong>${urunAdet}</strong> Ürün (${urunFiyat} TL)</div>`;

        document.getElementById('order').innerHTML = htmlIcerik;
        
        // Verilen paraları "100 + 50 + 10" gibi göster
        document.getElementById('money').innerHTML = `
            <small style="font-weight:normal; font-size:0.8rem">Müşterinin Uzattığı:</small><br>
            ${odeme.liste.join(' + ')} = <strong>${odeme.toplam} TL</strong>
        `;
        
        document.getElementById('changeInput').value = '';
        document.getElementById('feedback').innerText = '';
        document.getElementById('changeInput').focus();
    }

    function kontrolEt() {
        const cIn = parseFloat(document.getElementById('changeInput').value);
        const f = document.getElementById('feedback');

        if (isNaN(cIn)) return;

        if (cIn === data.paraUstu) {
            f.innerHTML = "<span class='success'>✅ DOĞRU!</span>";
            skor.d++;
            setTimeout(yeniMusteri, 1000);
        } else {
            f.innerHTML = `<span class='error'>❌ HATALI!<br>Doğru Cevap: ${data.paraUstu} TL</span>`;
            skor.y++;
        }
        document.getElementById('stats').innerText = `Doğru: ${skor.d} | Yanlış: ${skor.y}`;
    }

    yeniMusteri();
    document.getElementById('changeInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') kontrolEt(); });
</script>

</body>
</html>
