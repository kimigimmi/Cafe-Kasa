<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Kasa - Pratik</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f8f9fa; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 360px; text-align: center; }
        .order-info { background: #fff4e6; border: 2px solid #ff922b; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: left; font-size: 1.1rem; }
        .money-box { background: #e3fafc; color: #0c8599; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; font-size: 1.2rem; border: 1px solid #99e9f2; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #dee2e6; border-radius: 8px; box-sizing: border-box; font-size: 1.1rem; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        .btn-check { background: #51cf66; color: white; }
        .btn-check:hover { background: #40c057; }
        #feedback { margin-top: 15px; font-weight: bold; min-height: 50px; }
        .success { color: #2b8a3e; }
        .error { color: #c92a2a; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top:0">Hızlı Kasa</h2>
    
    <div id="order" class="order-info"></div>
    <div id="money" class="money-box"></div>

    <input type="number" id="totalInput" placeholder="Toplam Tutar?" step="0.5">
    <input type="number" id="changeInput" placeholder="Para Üstü?" step="0.5">
    
    <button class="btn-check" onclick="kontrolEt()">ONAYLA</button>

    <div id="feedback"></div>
</div>

<script>
    let data = { toplam: 0, paraUstu: 0 };
    const banknotlar = [20, 50, 100, 200];

    function yeniMusteri() {
        const ekmekAdet = Math.floor(Math.random() * 7); 
        const urunAdet = Math.floor(Math.random() * 3);  
        
        // Fiyatı 5'in katı yap: 20'den başlayıp 100'e kadar 5'er 5'er artar
        const urunFiyat = (Math.floor(Math.random() * 17) + 4) * 5; 

        data.toplam = (ekmekAdet * 17.5) + (urunAdet * urunFiyat);
        
        if (data.toplam === 0) return yeniMusteri();

        // Müşterinin vereceği parayı belirle
        let verilen = banknotlar.find(b => b >= data.toplam);
        if (!verilen) {
            // Toplam 200'ü geçerse iki tane 200 veya daha yüksek banknot simülasyonu
            verilen = Math.ceil(data.toplam / 100) * 100;
        }
        
        data.paraUstu = verilen - data.toplam;

        let metin = `🥖 <strong>${ekmekAdet}</strong> Ekmek (17.5 TL)`;
        if(urunAdet > 0) {
            metin += `<br>☕ <strong>${urunAdet}</strong> Ürün (Adet: ${urunFiyat} TL)`;
        }

        document.getElementById('order').innerHTML = metin;
        document.getElementById('money').innerText = `Müşteri ${verilen} TL verdi.`;
        
        document.getElementById('totalInput').value = '';
        document.getElementById('changeInput').value = '';
        document.getElementById('feedback').innerText = '';
        document.getElementById('totalInput').focus();
    }

    function kontrolEt() {
        const tInput = parseFloat(document.getElementById('totalInput').value);
        const cInput = parseFloat(document.getElementById('changeInput').value);
        const f = document.getElementById('feedback');

        if (tInput === data.toplam && cInput === data.paraUstu) {
            f.innerHTML = "<span class='success'>✅ DOĞRU!<br>Sıradaki müşteri geliyor...</span>";
            setTimeout(yeniMusteri, 1500);
        } else {
            f.innerHTML = `<span class='error'>❌ HATA!<br>Toplam: ${data.toplam} TL<br>Para Üstü: ${data.paraUstu} TL</span>`;
        }
    }

    yeniMusteri();

    document.getElementById('totalInput').addEventListener('keypress', (e) => { 
        if(e.key === 'Enter') document.getElementById('changeInput').focus(); 
    });
    document.getElementById('changeInput').addEventListener('keypress', (e) => { 
        if(e.key === 'Enter') kontrolEt(); 
    });
</script>

</body>
</html>
