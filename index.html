<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hızlı Kasa - Profesyonel Pratik</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f1f3f5; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 360px; text-align: center; }
        .order-info { background: #fff9db; border: 2px solid #fcc419; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: left; font-size: 1.1rem; color: #444; }
        .money-box { background: #e7f5ff; color: #1971c2; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; font-size: 1.2rem; border: 1px solid #a5d8ff; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #dee2e6; border-radius: 8px; box-sizing: border-box; font-size: 1.1rem; }
        input:focus { border-color: #339af0; outline: none; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; background: #40c057; color: white; transition: 0.2s; }
        button:hover { background: #37b24d; }
        #feedback { margin-top: 15px; font-weight: bold; min-height: 50px; line-height: 1.4; }
        .success { color: #2f9e44; }
        .error { color: #e03131; }
        .stats { margin-top: 15px; font-size: 0.8rem; color: #adb5bd; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top:0; color: #343a40;">Cafe Kasa</h2>
    
    <div id="order" class="order-info"></div>
    <div id="money" class="money-box"></div>

    <input type="number" id="totalInput" placeholder="Toplam Tutar?" step="0.5">
    <input type="number" id="changeInput" placeholder="Para Üstü?" step="0.5">
    
    <button onclick="kontrolEt()">HESAPLA</button>

    <div id="feedback"></div>
    <div id="stats" class="stats">Doğru: 0 | Yanlış: 0</div>
</div>

<script>
    let data = { toplam: 0, paraUstu: 0 };
    let skor = { d: 0, y: 0 };
    const banknotlar = [5, 10, 20, 50, 100, 200];

    function odemeHesapla(toplam) {
        // Tek bir banknot yetiyorsa onu ver
        let uygunTek = banknotlar.find(b => b >= toplam);
        if (uygunTek) return uygunTek;

        // Kombinasyon hesapla (Örn: 130 TL için 100+50 mi yoksa 200 mü?)
        // En büyük banknotu çıkarıp kalanı en yakın banknotla tamamlama mantığı
        let buyukBanknot = [...banknotlar].reverse().find(b => b < toplam);
        let kalan = toplam - buyukBanknot;
        let tamamlayici = banknotlar.find(b => b >= kalan);
        
        let kombinasyon = buyukBanknot + tamamlayici;
        let tekUstBanknot = banknotlar.find(b => b >= toplam) || 400;

        // Hangisi daha mantıklıysa (daha küçük olan ödeme) onu döndür
        return Math.min(kombinasyon, tekUstBanknot);
    }

    function yeniMusteri() {
        const ekmekAdet = Math.floor(Math.random() * 7); 
        const urunAdet = Math.floor(Math.random() * 3);  
        const urunFiyat = (Math.floor(Math.random() * 17) + 4) * 5; // 5'in katı

        data.toplam = (ekmekAdet * 17.5) + (urunAdet * urunFiyat);
        
        if (data.toplam === 0) return yeniMusteri();

        let verilen = odemeHesapla(data.toplam);
        data.paraUstu = verilen - data.toplam;

        let metin = `🥖 <strong>${ekmekAdet}</strong> Ekmek (17.5 TL)`;
        if(urunAdet > 0) {
            metin += `<br>☕ <strong>${urunAdet}</strong> Ürün (Birim: ${urunFiyat} TL)`;
        }

        document.getElementById('order').innerHTML = metin;
        document.getElementById('money').innerText = `Müşteri ${verilen} TL verdi.`;
        
        document.getElementById('totalInput').value = '';
        document.getElementById('changeInput').value = '';
        document.getElementById('feedback').innerText = '';
        document.getElementById('totalInput').focus();
    }

    function kontrolEt() {
        const tIn = parseFloat(document.getElementById('totalInput').value);
        const cIn = parseFloat(document.getElementById('changeInput').value);
        const f = document.getElementById('feedback');

        if (tIn === data.toplam && cIn === data.paraUstu) {
            f.innerHTML = "<span class='success'>✅ DOĞRU!<br>Harika gidiyorsun.</span>";
            skor.d++;
            setTimeout(yeniMusteri, 1500);
        } else {
            f.innerHTML = `<span class='error'>❌ HATALI!<br>Toplam: ${data.toplam} | P.Üstü: ${data.paraUstu}</span>`;
            skor.y++;
        }
        document.getElementById('stats').innerText = `Doğru: ${skor.d} | Yanlış: ${skor.y}`;
    }

    yeniMusteri();

    document.getElementById('totalInput').addEventListener('keypress', (e) => { 
        if(e.key === 'Enter') document.getElementById('changeInput').focus(); 
    });
    document.getElementById('changeInput').addEventListener('keypress', (e) => { 
        if(e.key === 'Enter') kontrolEt(); 
    });
</script>

</body>
</html>
